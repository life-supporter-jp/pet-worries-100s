            width: 100%;

        /* スクロールバー非表示 */
        .carousel-viewport::-webkit-scrollbar {
            height: 5px;
        }
        .carousel-viewport::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 10px;
        }

<p><h2>🐶🐱 ペットのお悩み解決全100項目・約100文字の超要約集</h2></p>
<br>
<p>「うちに来てくれてありがとう。」<br>
「毎日笑顔をくれてありがとう。」<br>
「家族になってくれてありがとう。」<br>

let currentIndex = 0;

// 画像リストの生成
const dogList = [];
for(let i = 1; i <= 464; i++) {
    let num = i.toString().padStart(2, '0');
    dogList.push(`https://life-supporter.jp/sp/hxySQ4ff/VjDWurLR/images/dog/${num}.jpg`);
}

const catList = [];
for(let i = 11894; i <= 11957; i++) {
    catList.push(`https://life-supporter.jp/sp/hxySQ4ff/qKIDwdCn/images/CAT/XS0${i}.jpg`);
}

function init() {
    buildCarouselList(articleList);
    updateDisplay(); 
}

// カルーセルの生成
function buildCarouselList(filteredList, isSearching = false) {
    const viewportEl = document.getElementById('carousel-viewport');
    viewportEl.innerHTML = '';
    
    // スライドボタンの取得
    const leftBtn = document.querySelector('.slide-btn-left');
    const rightBtn = document.querySelector('.slide-btn-right');

    if (filteredList.length === 0) {
        const noResults = document.createElement('div');
        noResults.className = 'no-results';
        noResults.textContent = '見つかりませんでした';
        viewportEl.appendChild(noResults);
        // 検索結果ゼロのときはスライドボタンを非表示に
        if(leftBtn) leftBtn.style.display = 'none';
        if(rightBtn) rightBtn.style.display = 'none';
        return;
    }

    if (isSearching) {
        // 検索中のとき：1列で縦並び、スライドボタンは不要なので隠す
        if(leftBtn) leftBtn.style.display = 'none';
        if(rightBtn) rightBtn.style.display = 'none';

        const groupEl = document.createElement('div');
        groupEl.className = 'carousel-group';
        groupEl.style.flex = '0 0 100%';
        
        filteredList.forEach((article) => {
            const originalIndex = articleList.findIndex(item => item.title === article.title);
            const item = document.createElement('div');
            item.className = `index-item ${originalIndex === currentIndex ? 'active' : ''}`;
            item.textContent = article.title;
            
            item.addEventListener('click', function() {
                selectArticle(originalIndex);
            });
            groupEl.appendChild(item);
        });
        viewportEl.appendChild(groupEl);
    } else {
        // 通常のとき：10個ずつのスライドに分ける、ボタンを表示する
        if(leftBtn) leftBtn.style.display = 'flex';
        if(rightBtn) rightBtn.style.display = 'flex';

        const itemsPerSlide = 10;
        const totalArticles = filteredList.length;
        
        for (let i = 0; i < totalArticles; i += itemsPerSlide) {
            const groupEl = document.createElement('div');
            groupEl.className = 'carousel-group';
            groupEl.id = `group-${Math.floor(i / itemsPerSlide)}`;
            
            for (let j = i; j < i + itemsPerSlide && j < totalArticles; j++) {
                const article = filteredList[j];
                const item = document.createElement('div');
                item.className = `index-item ${j === currentIndex ? 'active' : ''}`;
                item.id = `index-item-${j}`;
                item.textContent = article.title;
                
                const targetIdx = j;
                item.addEventListener('click', function() {
                    selectArticle(targetIdx);
                });
                
                groupEl.appendChild(item);
            }
            viewportEl.appendChild(groupEl);
        }
    }
}

// ★ リスト専用スライドボタン（左右矢印ボタン）が押されたときのスクロール処理
function slideCarousel(direction) {
    const viewport = document.getElementById('carousel-viewport');
    if (viewport) {
        // 1スライド幅（ビューポートの横幅）の分だけ左右にスクロール
        const scrollAmount = viewport.clientWidth * direction;
        viewport.scrollBy({
            left: scrollAmount,
            behavior: 'smooth'
        });
    }
}

function handleSearch() {
    const keyword = document.getElementById('search-input').value.trim().toLowerCase();
    if (keyword === '') {
        buildCarouselList(articleList, false);
        renderArticle();
    } else {
        const filtered = articleList.filter(article => 
            article.title.toLowerCase().includes(keyword) || 
            article.comment.toLowerCase().includes(keyword)
        );
        buildCarouselList(filtered, true);
    }
}

function selectArticle(index) {
    currentIndex = index;
    updateDisplay();
}

function updateDisplay() {
    const today = new Date();
    let currentType = localStorage.getItem('lastDisplayedPet');
    if (!currentType || currentType === 'cat') {
        currentType = 'dog';
    } else {
        currentType = 'cat';
    }
    localStorage.setItem('lastDisplayedPet', currentType);

    const bodyEl = document.body;
    const imgEl = document.getElementById('daily-pet');
    const titleEl = document.getElementById('pet-title');
    const descEl = document.getElementById('pet-desc');
    const dateEl = document.getElementById('current-date');

    if (currentType === 'dog') {
        bodyEl.style.backgroundColor = '#f0f2f5';
        const imgIndex = Math.floor(Math.random() * dogList.length);
        imgEl.src = dogList[imgIndex];
        imgEl.alt = "今日のわんこ";
        titleEl.textContent = "🐶 今日の癒しわんこ";
        descEl.style.background = '#fdf6e3';
        descEl.style.borderLeft = '5px solid #e67e22';
    } else {
        bodyEl.style.backgroundColor = '#f0f7f9';
        const imgIndex = Math.floor(Math.random() * catList.length);
        imgEl.src = catList[imgIndex];
        imgEl.alt = "今日の猫";
        titleEl.textContent = "🐱 今日の癒しにゃんこ";
        descEl.style.background = '#edf7ff';
        descEl.style.borderLeft = '5px solid #3498db';
    }
    
    renderArticle();
    
    const dateStr = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
    dateEl.textContent = dateStr;
}

function renderArticle() {
    const article = articleList[currentIndex];
    document.getElementById('display-title').textContent = article.title;
    document.getElementById('display-comment').textContent = article.comment;
    document.getElementById('page-num').textContent = `${currentIndex + 1} / ${articleList.length}`;
    
    const searchInput = document.getElementById('search-input');
    if (searchInput && searchInput.value.trim() === '') {
        const items = document.querySelectorAll('.index-item');
        items.forEach((item, index) => {
            if (index === currentIndex) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });

        const groupIndex = Math.floor(currentIndex / 10);
        const viewport = document.getElementById('carousel-viewport');
        
        if (viewport) {
            viewport.scrollTo({
                left: viewport.clientWidth * groupIndex,
                behavior: 'smooth'
            });
        }
    } else {
        const items = document.querySelectorAll('.index-item');
        items.forEach((item) => {
            if (item.textContent === article.title) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }
}

function nextArticle() {
    if (currentIndex < articleList.length - 1) {
        currentIndex++;
    } else {
        currentIndex = 0;
    }
    updateDisplay();
}

function prevArticle() {
    if (currentIndex > 0) {
        currentIndex--;
    } else {
        currentIndex = articleList.length - 1;
    }
    updateDisplay();
}

window.onload = init;
</script>
